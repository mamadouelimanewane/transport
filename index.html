<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="SenBus — Transport en commun Dakar. DDD Bus, AFTU, BRT, TER. Itinéraires, horaires, billets." />
    <meta name="theme-color" content="#1a56db" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SenBus" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <title>SenBus — Transport Dakar 🚌</title>
    <style>
      html,body,#root{margin:0;height:100%;overflow:hidden}
      body{background:#1a56db}
      #splash{
        position:fixed;inset:0;z-index:9999;
        background:linear-gradient(135deg,#3b82f6 0%,#1a56db 50%,#1e3a8a 100%);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        transition:opacity .4s ease;
      }
      #splash.hide{opacity:0;pointer-events:none}
      #s-icon{font-size:56px;margin-bottom:14px;animation:sb .8s ease infinite alternate}
      #s-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:#fff}
      #s-sub{font-size:13px;color:rgba(255,255,255,.65);margin-top:4px}
      #s-dots{display:flex;gap:6px;margin-top:32px}
      #s-dots span{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.3)}
      #s-dots span:nth-child(2){background:#fff;width:18px}
      @keyframes sb{from{transform:translateY(0)}to{transform:translateY(-8px)}}
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="s-icon">🚌</div>
      <div id="s-title">SenBus</div>
      <div id="s-sub">Transport en commun · Dakar 🇸🇳</div>
      <div id="s-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load',()=>{
        setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),400)}},1000);
      });
    </script>
  </body>
</html>
