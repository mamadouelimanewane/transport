<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="description" content="DakarMobile — Transport en commun à Dakar. Planifiez vos trajets DDD Bus, BRT, TER et AFTU." />
    <meta name="theme-color" content="#1a56db" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DakarMobile 🚌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      body { background: #0f1117; }
      #splash {
        position: fixed; inset: 0; background: linear-gradient(135deg, #1a56db 0%, #0d3b9e 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity .5s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-icon { font-size: 64px; margin-bottom: 16px; animation: bounce .8s ease infinite alternate; }
      #splash-title { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700; color: #fff; margin: 0; }
      #splash-sub { font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,.7); margin-top: 6px; }
      @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-icon">🚌</div>
      <div id="splash-title">DakarMobile</div>
      <div id="splash-sub">Transport en commun · Sénégal 🇸🇳</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 500); }
        }, 1200);
      });
    </script>
  </body>
</html>
